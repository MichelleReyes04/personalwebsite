services:
  - type: web
    name: michellecodedotdev
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn Backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: michellecodedotdev-db
          property: connectionString

databases:
  - name: michellecodedotdev-db
    plan: free
